<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src http://localhost:*;">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <title>Sticky</title>
</head>
<body>
  <!-- Title bar -->
  <div id="drag-handle">
    <div class="titlebar-left">
      <div class="drag-dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <span class="title">Sticky</span>
    </div>
    <div class="titlebar-right">
      <button id="undo-btn" class="icon-btn" title="Undo">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"
             stroke="currentColor" stroke-width="1.6"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 5.5H9a3.5 3.5 0 0 1 0 7H5"/>
          <path d="M2 5.5L5 2.5M2 5.5L5 8.5"/>
        </svg>
      </button>
      <button id="history-btn" class="icon-btn" title="Input history">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"
             stroke="currentColor" stroke-width="1.6"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="7" cy="7" r="5.5"/>
          <path d="M7 4V7l2 1.5"/>
        </svg>
      </button>
      <button id="theme-toggle" class="icon-btn" title="Color scheme">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"
             stroke="currentColor" stroke-width="1.6"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="7" cy="7" r="5.5"/>
          <path d="M7 1.5v11M1.5 7h11"/>
          <path d="M2.5 3.5Q5 5 5 7t-2.5 3.5"/>
          <path d="M11.5 3.5Q9 5 9 7t2.5 3.5"/>
        </svg>
      </button>
      <div id="status-indicator" class="status-dot offline" title="Ollama: checking..."></div>
    </div>
  </div>

  <!-- Input history panel (inline, below title bar) -->
  <div id="history-panel" class="hidden">
    <div class="history-header">
      <span>INPUT HISTORY</span>
      <button id="history-close">×</button>
    </div>
    <div class="history-scroll">
      <ul id="history-list"></ul>
      <div id="history-empty" class="hidden">no history yet</div>
    </div>
  </div>

  <!-- Active checklist items -->
  <div id="checklist-section">
    <ul id="active-list"></ul>
    <div id="empty-state" class="hidden">
      <p>no active tasks · add one below</p>
    </div>
  </div>

  <!-- Completed items (collapsible) -->
  <div id="completed-section">
    <button id="completed-toggle" class="section-toggle">
      <span>COMPLETED (<span id="completed-count">0</span>)</span>
      <span class="chevron">▾</span>
    </button>
    <ul id="completed-list" class="collapsed"></ul>
    <button id="clear-completed" class="text-button hidden">Clear completed</button>
  </div>

  <!-- Input bar -->
  <div id="input-section">
    <div class="input-row">
      <span class="input-prompt">›</span>
      <input id="note-input" type="text" placeholder="Jot down a note" autocomplete="off">
      <button id="add-btn" class="add-button hidden">add</button>
    </div>
    <div id="queue-indicator" class="hidden"></div>
  </div>

  <!-- Error banner -->
  <div id="error-banner" class="hidden">
    <span id="error-message"></span>
    <button id="error-dismiss">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M3.5 3.5L10.5 10.5M10.5 3.5L3.5 10.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <!-- Loading overlay (used only for task context processing) -->
  <div id="loading-overlay" class="hidden">
    <div class="loading-dots">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <span class="loading-text">Processing with Ollama</span>
  </div>

  <!-- Custom confirm dialog -->
  <div id="confirm-dialog" class="hidden">
    <div class="confirm-backdrop"></div>
    <div class="confirm-card">
      <p id="confirm-message"></p>
      <div class="confirm-actions">
        <button id="confirm-cancel">Cancel</button>
        <button id="confirm-ok">OK</button>
      </div>
    </div>
  </div>

  <!-- Color scheme picker -->
  <div id="scheme-panel" class="hidden">
    <div class="scheme-header">
      <span>COLOR SCHEME</span>
      <button id="scheme-close">×</button>
    </div>
    <div class="scheme-list">
      <button class="scheme-option" data-scheme="dark">
        <span class="scheme-swatch" style="background: #6c63ff;"></span>
        <span class="scheme-name">Obsidian Dark</span>
        <span class="scheme-check hidden">✓</span>
      </button>
      <button class="scheme-option" data-scheme="light">
        <span class="scheme-swatch" style="background: #5b52ee;"></span>
        <span class="scheme-name">Obsidian Light</span>
        <span class="scheme-check hidden">✓</span>
      </button>
      <button class="scheme-option" data-scheme="nord">
        <span class="scheme-swatch" style="background: #88c0d0;"></span>
        <span class="scheme-name">Nord</span>
        <span class="scheme-check hidden">✓</span>
      </button>
      <button class="scheme-option" data-scheme="rose">
        <span class="scheme-swatch" style="background: #e8759a;"></span>
        <span class="scheme-name">Rosé</span>
        <span class="scheme-check hidden">✓</span>
      </button>
      <button class="scheme-option" data-scheme="forest">
        <span class="scheme-swatch" style="background: #4ade80;"></span>
        <span class="scheme-name">Forest</span>
        <span class="scheme-check hidden">✓</span>
      </button>
      <button class="scheme-option" data-scheme="ocean">
        <span class="scheme-swatch" style="background: #38bdf8;"></span>
        <span class="scheme-name">Ocean</span>
        <span class="scheme-check hidden">✓</span>
      </button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
