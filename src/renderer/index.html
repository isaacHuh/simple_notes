<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src http://localhost:*;">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <title>Sticky</title>
</head>
<body>
  <!-- Title bar -->
  <div id="drag-handle">
    <div class="titlebar-left">
      <div class="drag-dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <span class="title">Sticky</span>
    </div>
    <div class="titlebar-right">
      <button id="undo-btn" class="icon-btn" title="Undo">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"
             stroke="currentColor" stroke-width="1.6"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 5.5H9a3.5 3.5 0 0 1 0 7H5"/>
          <path d="M2 5.5L5 2.5M2 5.5L5 8.5"/>
        </svg>
      </button>
      <button id="redo-btn" class="icon-btn disabled" title="Redo">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"
             stroke="currentColor" stroke-width="1.6"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 5.5H5a3.5 3.5 0 0 0 0 7h4"/>
          <path d="M12 5.5L9 2.5M12 5.5L9 8.5"/>
        </svg>
      </button>
      <button id="history-btn" class="icon-btn" title="Input history">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"
             stroke="currentColor" stroke-width="1.6"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="7" cy="7" r="5.5"/>
          <path d="M7 4V7l2 1.5"/>
        </svg>
      </button>
      <button id="theme-toggle" class="icon-btn" title="Toggle theme">
        <svg class="icon-sun" width="14" height="14" viewBox="0 0 14 14" fill="none"
             stroke="currentColor" stroke-width="1.6"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="7" cy="7" r="2.5"/>
          <path d="M7 1v1.5M7 11.5V13M1 7h1.5M11.5 7H13M2.93 2.93l1.06 1.06M10.01 10.01l1.06 1.06M10.01 3.99l1.06-1.06M2.93 11.07l1.06-1.06"/>
        </svg>
        <svg class="icon-moon" width="13" height="13" viewBox="0 0 13 13" fill="none"
             stroke="currentColor" stroke-width="1.6"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 8.5A5 5 0 1 1 4.5 2a3.5 3.5 0 0 0 6.5 6.5z"/>
        </svg>
      </button>
      <div id="status-indicator" class="status-dot offline" title="Ollama: checking..."></div>
    </div>
  </div>

  <!-- Input history panel (inline, below title bar) -->
  <div id="history-panel" class="hidden">
    <div class="history-header">
      <span>INPUT HISTORY</span>
      <button id="history-close">×</button>
    </div>
    <div class="history-scroll">
      <ul id="history-list"></ul>
      <div id="history-empty" class="hidden">no history yet</div>
    </div>
  </div>

  <!-- Active checklist items -->
  <div id="checklist-section">
    <ul id="active-list"></ul>
    <div id="empty-state" class="hidden">
      <p>no active tasks · add one below</p>
    </div>
  </div>

  <!-- Completed items (collapsible) -->
  <div id="completed-section">
    <button id="completed-toggle" class="section-toggle">
      <span>COMPLETED (<span id="completed-count">0</span>)</span>
      <span class="chevron">▾</span>
    </button>
    <ul id="completed-list" class="collapsed"></ul>
    <button id="clear-completed" class="text-button hidden">Clear completed</button>
  </div>

  <!-- Input bar -->
  <div id="input-section">
    <div class="input-row">
      <span class="input-prompt">›</span>
      <input id="note-input" type="text" placeholder="Jot down a note" autocomplete="off">
      <button id="add-btn" class="add-button hidden">add</button>
    </div>
    <div id="queue-indicator" class="hidden"></div>
  </div>

  <!-- Error banner -->
  <div id="error-banner" class="hidden">
    <span id="error-message"></span>
    <button id="error-dismiss">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M3.5 3.5L10.5 10.5M10.5 3.5L3.5 10.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <!-- Setup wizard overlay -->
  <div id="setup-wizard" class="hidden">
    <div class="setup-content">
      <div class="setup-header">
        <span class="setup-title">Welcome to Sticky</span>
        <span class="setup-subtitle">Let's get your local AI set up</span>
      </div>

      <div class="setup-steps">
        <!-- Step 1: Install Ollama -->
        <div class="setup-step" id="step-install" data-status="checking">
          <div class="step-indicator">
            <div class="step-icon step-checking">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="7" cy="7" r="5.5" opacity="0.3"/></svg>
            </div>
            <div class="step-icon step-pass hidden">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7.5L5.5 10L11 4"/></svg>
            </div>
            <div class="step-icon step-fail hidden">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3.5 3.5L10.5 10.5M10.5 3.5L3.5 10.5"/></svg>
            </div>
          </div>
          <div class="step-body">
            <span class="step-label">Ollama installed &amp; running</span>
            <span class="step-hint hidden" id="step-install-hint">Download and open Ollama to continue</span>
            <div class="step-actions hidden" id="step-install-actions">
              <button class="setup-btn" id="btn-download-ollama">Download Ollama</button>
              <button class="setup-btn-text" id="btn-recheck-ollama">Check again</button>
            </div>
          </div>
        </div>

        <!-- Step 2: Pull model -->
        <div class="setup-step" id="step-model" data-status="waiting">
          <div class="step-indicator">
            <div class="step-icon step-checking hidden">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="7" cy="7" r="5.5" opacity="0.3"/></svg>
            </div>
            <div class="step-icon step-pass hidden">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7.5L5.5 10L11 4"/></svg>
            </div>
            <div class="step-icon step-fail hidden">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3.5 3.5L10.5 10.5M10.5 3.5L3.5 10.5"/></svg>
            </div>
            <div class="step-icon step-waiting">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" opacity="0.25"><circle cx="7" cy="7" r="5.5"/></svg>
            </div>
          </div>
          <div class="step-body">
            <span class="step-label" id="step-model-label">Model ready</span>
            <span class="step-hint hidden" id="step-model-hint"></span>
            <div class="step-progress hidden" id="step-model-progress">
              <div class="progress-bar"><div class="progress-fill" id="pull-progress-fill"></div></div>
              <span class="progress-text" id="pull-progress-text">Downloading...</span>
            </div>
            <div class="step-actions hidden" id="step-model-actions">
              <button class="setup-btn" id="btn-pull-model">Pull Model</button>
            </div>
          </div>
        </div>
      </div>

      <div class="setup-footer hidden" id="setup-footer">
        <button class="setup-btn-primary" id="btn-setup-done">Get Started</button>
      </div>

      <button class="setup-skip" id="btn-setup-skip">Skip setup</button>
    </div>
  </div>

  <!-- Loading overlay (used only for task context processing) -->
  <div id="loading-overlay" class="hidden">
    <div class="loading-dots">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <span class="loading-text">Processing with Ollama</span>
  </div>

  <!-- Custom confirm dialog -->
  <div id="confirm-dialog" class="hidden">
    <div class="confirm-backdrop"></div>
    <div class="confirm-card">
      <p id="confirm-message"></p>
      <div class="confirm-actions">
        <button id="confirm-cancel">Cancel</button>
        <button id="confirm-ok">OK</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
