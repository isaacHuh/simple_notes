<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src http://localhost:*;">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <title>SimpleNotes</title>
</head>
<body>
  <!-- Draggable title bar -->
  <div id="drag-handle">
    <span class="drag-dots">&#x2630;</span>
    <span class="title">SimpleNotes</span>
    <div id="status-indicator" class="status-dot offline" title="Ollama: checking..."></div>
  </div>

  <!-- Active checklist items -->
  <div id="checklist-section">
    <ul id="active-list"></ul>
    <div id="empty-state" class="hidden">
      <p>No items yet. Type a note below and press Process to generate checklist items.</p>
    </div>
  </div>

  <!-- Completed items (collapsible) -->
  <div id="completed-section">
    <button id="completed-toggle" class="section-toggle">
      Completed (<span id="completed-count">0</span>)
      <span class="chevron">&#9660;</span>
    </button>
    <ul id="completed-list" class="collapsed"></ul>
    <button id="clear-completed" class="text-button hidden">Clear Completed</button>
  </div>

  <!-- Input area -->
  <div id="input-section">
    <textarea id="note-input" placeholder="Type your note..." rows="3"></textarea>
    <div id="context-section" class="hidden">
      <textarea id="context-input" placeholder="Additional context..." rows="2"></textarea>
    </div>
    <div id="input-actions">
      <button id="add-context-btn" class="text-button">+ Add Context</button>
      <button id="submit-btn" class="primary-button">Process</button>
    </div>
  </div>

  <!-- Error banner -->
  <div id="error-banner" class="hidden">
    <span id="error-message"></span>
    <button id="error-dismiss">&times;</button>
  </div>

  <!-- Loading overlay -->
  <div id="loading-overlay" class="hidden">
    <div class="spinner"></div>
    <span>Processing with Ollama...</span>
  </div>

  <script src="app.js"></script>
</body>
</html>
